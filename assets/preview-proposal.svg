<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="sideBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#252b4a;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="2" dy="0" stdDeviation="8" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Main background -->
  <rect width="900" height="520" fill="#f0f2f8"/>

  <!-- Left sidebar -->
  <rect x="0" y="0" width="220" height="520" fill="url(#sideBg)"/>

  <!-- Sidebar: Logo -->
  <text x="24" y="44" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#ffffff">Tally</text>
  <line x1="24" y1="56" x2="196" y2="56" stroke="#ffffff15" stroke-width="1"/>

  <!-- Sidebar: nav items -->
  <rect x="12" y="68" width="196" height="32" rx="6" fill="#ffffff15"/>
  <text x="36" y="88" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#ffffff">Dashboard</text>
  <text x="36" y="122" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#ffffff70">Active Proposals</text>
  <text x="36" y="152" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#ffffff70">Protocols</text>
  <text x="36" y="182" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#ffffff70">History</text>
  <text x="36" y="212" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#ffffff70">Settings</text>

  <line x1="24" y1="230" x2="196" y2="230" stroke="#ffffff15" stroke-width="1"/>
  <text x="24" y="254" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#ffffff50">WATCHED PROTOCOLS</text>
  <text x="36" y="278" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#a78bfa">Aave</text>
  <text x="36" y="300" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#60a5fa">Uniswap</text>
  <text x="36" y="322" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#fbbf24">Mango</text>
  <text x="36" y="344" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#34d399">Marinade</text>
  <text x="36" y="366" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#f87171">Drift</text>

  <!-- Main content area -->
  <!-- Breadcrumb -->
  <text x="250" y="34" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#9ca3af">Proposals  /  Aave  /  AIP-401</text>

  <!-- Proposal title block -->
  <rect x="240" y="50" width="630" height="130" rx="10" fill="#ffffff" filter="url(#shadow2)"/>

  <rect x="260" y="68" width="48" height="20" rx="10" fill="#ede9fe"/>
  <text x="284" y="82" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle" font-weight="600">AAVE</text>

  <rect x="318" y="68" width="52" height="20" rx="10" fill="#dcfce7"/>
  <text x="344" y="82" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle" font-weight="600">ACTIVE</text>

  <rect x="380" y="68" width="80" height="20" rx="10" fill="#fef3c7"/>
  <text x="420" y="82" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#d97706" text-anchor="middle" font-weight="600">IMPORTANCE 8/10</text>

  <text x="260" y="116" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#111827">AIP-401: Increase wstETH Supply Cap on Aave V3 Ethereum</text>
  <text x="260" y="140" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280">Submitted by 0x4a8b...c3f1  •  April 3, 2026  •  Ends April 5, 2026  •  2,143,000 votes</text>
  <text x="260" y="162" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#374151">Raises the wstETH supply cap from 150,000 to 275,000 tokens to meet growing market demand.</text>

  <!-- Claude analysis block -->
  <rect x="240" y="196" width="630" height="100" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="260" y="218" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#16a34a" font-weight="600" letter-spacing="1">CLAUDE ANALYSIS</text>
  <text x="260" y="238" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#374151">This proposal is a routine supply cap increase driven by sustained borrowing demand. Risk is low</text>
  <text x="260" y="256" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#374151">given wstETH's established collateral profile. Strong community support with 78.4% FOR.</text>
  <text x="260" y="274" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#16a34a" font-weight="600">Recommendation: SUPPORT</text>

  <!-- Vote breakdown -->
  <rect x="240" y="310" width="300" height="170" rx="10" fill="#ffffff" filter="url(#shadow2)"/>
  <text x="260" y="336" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280" font-weight="600" letter-spacing="1">VOTE BREAKDOWN</text>

  <text x="260" y="364" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#16a34a" font-weight="600">FOR</text>
  <rect x="300" y="354" width="220" height="14" rx="7" fill="#f3f4f6"/>
  <rect x="300" y="354" width="172" height="14" rx="7" fill="#4ade80"/>
  <text x="526" y="366" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#16a34a">78.4%</text>

  <text x="260" y="394" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#ef4444" font-weight="600">AGAINST</text>
  <rect x="320" y="384" width="200" height="14" rx="7" fill="#f3f4f6"/>
  <rect x="320" y="384" width="36" height="14" rx="7" fill="#f87171"/>
  <text x="526" y="396" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#ef4444">18.2%</text>

  <text x="260" y="424" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#9ca3af" font-weight="600">ABSTAIN</text>
  <rect x="330" y="414" width="190" height="14" rx="7" fill="#f3f4f6"/>
  <rect x="330" y="414" width="6" height="14" rx="7" fill="#d1d5db"/>
  <text x="526" y="426" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#9ca3af">3.4%</text>

  <line x1="260" y1="444" x2="520" y2="444" stroke="#f3f4f6" stroke-width="1"/>
  <text x="260" y="464" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280">Quorum: 97.1% met</text>

  <!-- Key points -->
  <rect x="556" y="310" width="314" height="170" rx="10" fill="#ffffff" filter="url(#shadow2)"/>
  <text x="576" y="336" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280" font-weight="600" letter-spacing="1">KEY POINTS</text>
  <text x="576" y="362" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#374151">• 78.4% of votes in favor</text>
  <text x="576" y="384" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#374151">• 2.14M total votes cast</text>
  <text x="576" y="406" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#374151">• Quorum reached (97.1%)</text>
  <text x="576" y="428" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#374151">• Sentiment: BULLISH</text>
  <text x="576" y="450" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#374151">• Ends in 18 hours</text>
  <text x="576" y="472" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#374151">• Importance: 8 / 10</text>

  <!-- Footer -->
  <text x="250" y="506" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af">Tally  •  Governance Intelligence  •  Powered by Claude Agent SDK</text>
</svg>
