<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eef0f7;stop-opacity:1"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <filter id="tagGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="900" height="520" fill="url(#pageBg)"/>

  <!-- Top header bar -->
  <rect x="0" y="0" width="900" height="58" fill="#1a1f3a"/>
  <text x="30" y="37" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="bold" fill="#ffffff">Tally</text>
  <text x="92" y="37" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#ffffff70">Governance Intelligence</text>
  <rect x="740" y="16" width="130" height="26" rx="13" fill="#4ade8030" stroke="#4ade8060" stroke-width="1"/>
  <circle cx="758" cy="29" r="4" fill="#4ade80"/>
  <text x="770" y="33" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#4ade80">3 Active Proposals</text>

  <!-- Section label -->
  <text x="30" y="84" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280" letter-spacing="2">LIVE VOTES</text>

