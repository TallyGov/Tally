  <text x="860" y="375" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="end">890K votes</text>

  <text x="50" y="428" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#16a34a" font-weight="600">FOR</text>
  <text x="100" y="428" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#6b7280">91.2%</text>
  <rect x="50" y="433" width="575" height="8" rx="4" fill="#f3f4f6"/>
  <rect x="50" y="433" width="524" height="8" rx="4" fill="#f59e0b"/>

  <text x="640" y="428" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#ef4444" font-weight="600" text-anchor="end">AGAINST</text>
  <text x="700" y="428" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="end">6.8%</text>
  <rect x="640" y="433" width="200" height="8" rx="4" fill="#f3f4f6"/>
  <rect x="640" y="433" width="14" height="8" rx="4" fill="#ef4444"/>

  <text x="860" y="428" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="end">2.0% abstain</text>

  <!-- Footer -->
