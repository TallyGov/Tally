  <text x="142" y="127" font-family="-apple-system, Arial, sans-serif" font-size="10" font-weight="600" fill="#16a34a" text-anchor="middle">ACTIVE</text>

  <!-- Title -->
  <text x="50" y="154" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#111827">AIP-401: Increase wstETH Supply Cap on Aave V3 Ethereum</text>

  <!-- Ends at -->
  <text x="700" y="127" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="end">ends in 18h</text>
