  <rect x="50" y="309" width="351" height="8" rx="4" fill="#4ade80"/>

  <text x="640" y="304" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#ef4444" font-weight="600" text-anchor="end">AGAINST</text>
  <text x="700" y="304" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="end">35.0%</text>
  <rect x="640" y="309" width="200" height="8" rx="4" fill="#f3f4f6"/>
  <rect x="640" y="309" width="70" height="8" rx="4" fill="#ef4444"/>

  <text x="860" y="304" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="end">4.0% abstain</text>

