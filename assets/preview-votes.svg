  <text x="50" y="180" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#16a34a" font-weight="600">FOR</text>
  <text x="100" y="180" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#6b7280">78.4%</text>
  <rect x="50" y="185" width="575" height="8" rx="4" fill="#f3f4f6"/>
  <rect x="50" y="185" width="451" height="8" rx="4" fill="#4ade80"/>

